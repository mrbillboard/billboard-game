<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Billboard Game</title>
<style>
  :root{
    --navy:#0b2545;--navy2:#13315c;--blue:#1d6fb8;--accent:#f5a623;
    --green:#1faa59;--red:#d64545;--paper:#f4f6fb;--card:#ffffff;--ink:#11243e;--muted:#6b7a90;
    --purple:#7a4fd0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 55%,#0a1c33 100%);
    color:var(--ink);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:18px;
  }
  .wrap{width:100%;max-width:560px;}
  header.brand{text-align:center;color:#fff;margin:6px 0 16px;}
  .logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.5px;}
  .logo .mark{width:34px;height:34px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:20px;font-weight:900;box-shadow:0 3px 10px rgba(0,0,0,.3);}
  h1{font-size:26px;margin:10px 0 2px;color:#fff;letter-spacing:.3px;}
  .tagline{color:#9fc0e6;font-size:13px;margin:0;}
  .card{background:var(--card);border-radius:18px;padding:22px 20px 24px;box-shadow:0 18px 40px rgba(0,0,0,.35);}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;color:var(--muted);font-weight:600;}
  .pill{background:var(--paper);border-radius:999px;padding:5px 12px;}
  .pill b{color:var(--navy);}
  .bar{height:7px;background:var(--paper);border-radius:999px;overflow:hidden;margin-bottom:18px;}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));width:0;transition:width .35s ease;}
  .tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);background:#e8f1fb;border-radius:6px;padding:4px 9px;margin-bottom:12px;}
  .tag.managed{color:#fff;background:var(--accent);}
  .tag.fwy{color:#fff;background:var(--purple);}
  .q{font-size:19px;font-weight:700;line-height:1.35;margin:0 0 18px;color:var(--ink);}
  .q .hl{color:var(--blue);}
  .opts{display:flex;flex-direction:column;gap:12px;}
  .opt{text-align:left;border:2px solid #d8e2f0;background:#fff;border-radius:12px;padding:16px;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;transition:all .15s ease;display:flex;align-items:center;gap:12px;}
  .opt:hover:not(:disabled){border-color:var(--blue);background:#f5f9ff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,111,184,.15);}
  .opt:disabled{cursor:default;}
  .opt .ic{flex:0 0 24px;height:24px;border-radius:50%;border:2px solid #cdd7e6;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;background:#aebccd;}
  .opt.correct{border-color:var(--green);background:#eafaf0;}
  .opt.correct .ic{background:var(--green);border-color:var(--green);}
  .opt.wrong{border-color:var(--red);background:#fdeeee;}
  .opt.wrong .ic{background:var(--red);border-color:var(--red);}
  .opt.dim{opacity:.55;}
  .feedback{margin-top:16px;font-size:14px;font-weight:600;min-height:20px;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--red);}
  .feedback small{display:block;color:var(--muted);font-weight:500;margin-top:3px;}
  .detail{margin-top:14px;border:1px solid #e2e8f2;border-radius:14px;overflow:hidden;display:none;}
  .detail.show{display:block;animation:pop .3s ease;}
  .detail .dh{background:var(--navy);color:#fff;font-weight:800;font-size:14px;padding:11px 14px;display:flex;align-items:center;gap:8px;}
  .detail .dh .bk{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;font-weight:700;font-size:12px;border-radius:7px;padding:5px 10px;cursor:pointer;}
  .drow{display:flex;justify-content:space-between;gap:10px;padding:8px 14px;font-size:14px;border-top:1px solid #eef2f8;}
  .drow:first-of-type{border-top:none;}
  .drow .k{color:var(--muted);font-weight:600;}
  .drow .v{color:var(--ink);font-weight:700;text-align:right;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;background:#f8fafd;border-top:1px solid #eef2f8;}
  .chip{border:1.5px solid var(--blue);color:var(--blue);background:#fff;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;}
  .chip:hover{background:var(--blue);color:#fff;}
  .litem{padding:9px 14px;font-size:13.5px;border-top:1px solid #eef2f8;display:flex;justify-content:space-between;gap:10px;}
  .litem .lb{font-weight:800;color:var(--navy);}
  .litem .lm{color:var(--muted);text-align:right;}
  .lnote{padding:8px 14px;color:var(--muted);font-size:12px;background:#f8fafd;border-top:1px solid #eef2f8;}
  .hint{margin-top:18px;text-align:center;color:var(--muted);font-size:14px;font-weight:700;}
  .hint .up{color:var(--blue);}
  .next{margin-top:16px;width:100%;border:none;border-radius:14px;padding:18px;background:var(--accent);color:var(--navy);font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(245,166,35,.5);transition:transform .15s;display:none;letter-spacing:.3px;}
  .next.show{display:block;animation:pop .35s ease;}
  .next:hover{transform:translateY(-2px);}
  @keyframes pop{0%{transform:scale(.97);opacity:.4}100%{transform:scale(1);opacity:1}}
  .center{text-align:center;}
  .lead{color:var(--muted);font-size:15px;line-height:1.5;margin:6px 0 18px;}
  .btn-primary{border:none;border-radius:14px;padding:20px 26px;background:var(--accent);color:var(--navy);font-size:20px;font-weight:900;cursor:pointer;width:100%;box-shadow:0 8px 18px rgba(245,166,35,.5);transition:transform .15s;letter-spacing:.3px;}
  .btn-primary:hover{transform:translateY(-2px);}
  .score-num{font-size:54px;font-weight:900;color:var(--navy);line-height:1;margin:8px 0;}
  .score-num span{font-size:26px;color:var(--muted);font-weight:700;}
  .verdict{font-size:18px;font-weight:800;margin:4px 0 6px;}
  .stats{display:flex;gap:10px;justify-content:center;margin:18px 0 22px;flex-wrap:wrap;}
  .stat{background:var(--paper);border-radius:12px;padding:12px 16px;min-width:90px;}
  .stat b{display:block;font-size:22px;color:var(--navy);}
  .stat small{color:var(--muted);font-size:12px;}
  .footnote{color:#9fc0e6;font-size:11px;text-align:center;margin-top:14px;line-height:1.5;}
  ul.facts{text-align:left;color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 18px;padding-left:18px;}
</style>
</head>

const BOARDS = RAW.map(r=>({board:r[0],vendor:r[1],city:r[2],zip:r[3],market:r[4],
  company:MARKETS[r[4]].company, state:MARKETS[r[4]].state, marketLabel:MARKETS[r[4]].label, kind:"gen"}));
const MANAGED = MGD.map(r=>({board:r[0],vendor:r[1],city:r[2],zip:r[3],road:r[4],facing:r[5],type:r[6],state:r[7],size:r[8],kind:"mgd"}));
const FWY = OCF.map(r=>({board:r[0],fwy:r[1],city:r[2],zip:r[3],vendor:r[4],facing:r[5],type:r[6],size:r[7],kind:"fwy"}));

const ROUND_SIZE = 15;
const FACE = {N:"North",S:"South",E:"East",W:"West",NW:"Northwest",NE:"Northeast",SW:"Southwest",SE:"Southeast"};
const fwyName = n => "the "+n+" Fwy";

/* ---------- helpers ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function uniq(a){return [...new Set(a)];}
function sample(arr,n,exclude){return shuffle(arr.filter(x=>!exclude.includes(x))).slice(0,n);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

const ALL_VENDORS = uniq(BOARDS.map(b=>b.vendor));
const ALL_CITIES  = uniq(BOARDS.map(b=>b.city));
const CITY_ZIPS = {};
BOARDS.forEach(b=>{ if(b.zip){ (CITY_ZIPS[b.city]=CITY_ZIPS[b.city]||new Set()).add(b.zip); } });
const ALL_ZIPS = uniq(BOARDS.filter(b=>b.zip).map(b=>b.zip));
const citiesByCompany = {
  "Dallas Billboards LLC": uniq(BOARDS.filter(b=>b.company==="Dallas Billboards LLC").map(b=>b.city)),
  "Bray Outdoor Ads":      uniq(BOARDS.filter(b=>b.company==="Bray Outdoor Ads").map(b=>b.city))
};
const MGD_ROADS  = uniq(MANAGED.map(m=>m.road));
const MGD_CITIES = uniq(MANAGED.map(m=>m.city));
const MGD_ZIPS   = uniq(MANAGED.filter(m=>m.zip).map(m=>m.zip));
const FWY_LIST   = uniq(FWY.map(f=>f.fwy));
const FWY_CITIES = uniq(FWY.map(f=>f.city));
const FWY_VENDORS= uniq(FWY.map(f=>f.vendor));
const FWY_SIZES  = uniq(FWY.map(f=>f.size));
const FWY_BY = {}; FWY.forEach(f=>{(FWY_BY[f.fwy]=FWY_BY[f.fwy]||[]).push(f);});

const CITY_INDEX = {};
function addCity(c,o){ if(!c)return; (CITY_INDEX[c]=CITY_INDEX[c]||[]).push(o); }
FWY.forEach(f=>addCity(f.city,{board:f.board,who:f.vendor,where:fwyName(f.fwy)}));
BOARDS.forEach(b=>addCity(b.city,{board:b.board,who:b.vendor,where:b.marketLabel}));
MANAGED.forEach(m=>addCity(m.city,{board:m.board,who:m.vendor,where:m.road+" (managed)"}));

/* ============================================================
   QUESTION BUILDERS — general market pool
   ============================================================ */
function qZip(b){
  if(!b.zip) return null;
  const tz=CITY_ZIPS[b.city]; const d=sample(ALL_ZIPS.filter(z=>!tz.has(z)),3,[]); if(d.length<3)return null;
  return {tag:"ZIP Codes",cls:"",rec:b,html:`Which ZIP code belongs to a board in <span class="hl">${b.city}, ${b.state==="Texas"?"TX":"CA"}</span>?`,
    correct:b.zip,options:[b.zip,...d],note:`Board #${b.board} sits in ${b.city} (${b.zip}), ${b.marketLabel}.`};
}
function qVendor(b){
  const d=sample(ALL_VENDORS,3,[b.vendor]); if(d.length<3)return null;
  return {tag:"Who's There",cls:"",rec:b,html:`Which vendor operates board <span class="hl">#${b.board}</span> in ${b.city}?`,
    correct:b.vendor,options:[b.vendor,...d],note:`#${b.board} in ${b.city} is a ${b.vendor} board.`};
}
function qBoardCity(b){
  let pool=uniq(BOARDS.filter(x=>x.market===b.market&&x.city!==b.city).map(x=>x.city));
  if(pool.length<3)pool=ALL_CITIES.filter(c=>c!==b.city);
  const d=sample(pool,3,[]); if(d.length<3)return null;
  return {tag:"Board Numbers",cls:"",rec:b,html:`Board <span class="hl">#${b.board}</span> is located in which city?`,
    correct:b.city,options:[b.city,...d],note:`#${b.board} is in ${b.city}, ${b.marketLabel}.`};
}
function qBoardMarket(b){
  const o=sample(Object.values(MARKETS).map(m=>m.label),3,[b.marketLabel]); if(o.length<3)return null;
  return {tag:"Coverage Areas",cls:"",rec:b,html:`Board <span class="hl">#${b.board}</span> (${b.city}) is in which market?`,
    correct:b.marketLabel,options:[b.marketLabel,...o],note:`${b.city} is part of the ${b.marketLabel} market.`};
}
function qCompanyCity(b){
  return {tag:"My Business",cls:"",rec:b,html:`A billboard in <span class="hl">${b.city}, ${b.state}</span> is handled by which of Cory's agencies?`,
    correct:b.company,options:["Dallas Billboards LLC","Bray Outdoor Ads","Both agencies share it","Not covered by either"],fixed:true,
    note:`${b.state} → ${b.company}. (TX = Dallas Billboards LLC; any other state = Bray Outdoor Ads.)`};
}
function qCoverageCity(company){
  const c=pick(citiesByCompany[company]);
  const other=company==="Dallas Billboards LLC"?"Bray Outdoor Ads":"Dallas Billboards LLC";
  const d=sample(citiesByCompany[other],3,[]); if(d.length<3)return null;
  return {tag:"Coverage Areas",cls:"",html:`Which of these cities does <span class="hl">${company}</span> cover?`,
    correct:c,options:[c,...d],note:`${company} covers ${c}. The others are in ${other}'s territory.`};
}
function qMarketState(code){
  const m=MARKETS[code];
  return {tag:"Coverage Areas",cls:"",html:`The <span class="hl">${m.label}</span> market is located in which state?`,
    correct:m.state,options:["California","Texas","Florida","New York"],fixed:true,
    note:`${m.label} is in ${m.state}, handled by ${m.company}.`};
}

/* ============================================================
   QUESTION BUILDERS — Cory's 12 MANAGED boards
   ============================================================ */
function mgRoad(m){
  const d=sample(MGD_ROADS,3,[m.road]); if(d.length<3)return null;
  return {tag:"My Managed Boards",cls:"managed",rec:m,html:`Your managed board <span class="hl">${m.board}</span> is on which road / highway?`,
    correct:m.road,options:[m.road,...d],note:`${m.board} runs along ${m.road} in ${m.city}.`};
}
function mgCity(m){
  const d=sample(MGD_CITIES,3,[m.city]); if(d.length<3)return null;
  return {tag:"My Managed Boards",cls:"managed",rec:m,html:`Your managed board <span class="hl">${m.board}</span> is in which city?`,
    correct:m.city,options:[m.city,...d],note:`${m.board} is in ${m.city}${m.zip?" ("+m.zip+")":""}.`};
}
function mgZip(m){
  if(!m.zip)return null; const d=sample(MGD_ZIPS,3,[m.zip]); if(d.length<3)return null;
  return {tag:"My Managed Boards",cls:"managed",rec:m,html:`What ZIP code is your managed board <span class="hl">${m.board}</span> in?`,
    correct:m.zip,options:[m.zip,...d],note:`${m.board} is in ${m.city} (${m.zip}).`};
}
function mgFacing(m){
  if(!FACE[m.facing]||m.facing.length!==1)return null;
  return {tag:"My Managed Boards",cls:"managed",rec:m,html:`Which direction does your managed board <span class="hl">${m.board}</span> face?`,
    correct:FACE[m.facing],options:["North","South","East","West"],fixed:true,
    note:`${m.board} faces ${FACE[m.facing]} (on ${m.road}, ${m.city}).`};
}
function mgDigital(){
  const digi=pick(MANAGED.filter(m=>m.type==="Digital"));
  const d=sample(MANAGED.filter(m=>m.type!=="Digital").map(m=>m.board),3,[]); if(d.length<3)return null;
  return {tag:"My Managed Boards",cls:"managed",rec:digi,html:`Which of your managed boards is <span class="hl">DIGITAL</span>?`,
    correct:digi.board,options:[digi.board,...d],note:`${digi.board} (${digi.road}, ${digi.city}) is digital.`};
}
function mgState(m){
  return {tag:"My Managed Boards",cls:"managed",rec:m,html:`Your managed board <span class="hl">${m.board}</span> is in which state?`,
    correct:m.state==="TX"?"Texas":"California",options:["Texas","California","Florida","New York"],fixed:true,
    note:`${m.board} is in ${m.city}, ${m.state==="TX"?"Texas (Dallas Billboards LLC)":"California (Bray Outdoor Ads)"}.`};
}
function managedPool(){
  const p=[];
  MANAGED.forEach(m=>{[mgRoad(m),mgCity(m),mgZip(m),mgFacing(m),mgState(m)].forEach(q=>{if(q)p.push(q);});});
  for(let i=0;i<3;i++)p.push(mgDigital());
  return p.filter(Boolean);
}

/* ============================================================
   QUESTION BUILDERS — every OC FREEWAY board
   ============================================================ */
function fwOnWhich(f){
  const d=sample(FWY_LIST.map(fwyName),3,[fwyName(f.fwy)]); if(d.length<3)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`OC freeway board <span class="hl">#${f.board}</span> (${f.city}) is on which freeway?`,
    correct:fwyName(f.fwy),options:[fwyName(f.fwy),...d],note:`#${f.board} is on ${fwyName(f.fwy)} in ${f.city} (${f.vendor}).`};
}
function fwCity(f){
  const d=sample(FWY_CITIES,3,[f.city]); if(d.length<3)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`OC freeway board <span class="hl">#${f.board}</span> (on ${fwyName(f.fwy)}) is in which city?`,
    correct:f.city,options:[f.city,...d],note:`#${f.board} sits in ${f.city}, on ${fwyName(f.fwy)}.`};
}
function fwVendor(f){
  const d=sample(FWY_VENDORS,3,[f.vendor]); if(d.length<3)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`Which vendor operates OC freeway board <span class="hl">#${f.board}</span> on ${fwyName(f.fwy)}?`,
    correct:f.vendor,options:[f.vendor,...d],note:`#${f.board} on ${fwyName(f.fwy)} (${f.city}) is a ${f.vendor} board.`};
}
function fwFacing(f){
  if(!FACE[f.facing]||f.facing.length!==1)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`Which direction does OC freeway board <span class="hl">#${f.board}</span> (${fwyName(f.fwy)}, ${f.city}) face?`,
    correct:FACE[f.facing],options:["North","South","East","West"],fixed:true,
    note:`#${f.board} on ${fwyName(f.fwy)} faces ${FACE[f.facing]}.`};
}
function fwSize(f){
  if(!f.size)return null; const d=sample(FWY_SIZES,3,[f.size]); if(d.length<3)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`What size is OC freeway board <span class="hl">#${f.board}</span> (${fwyName(f.fwy)}, ${f.city})?`,
    correct:f.size,options:[f.size,...d],note:`#${f.board} is ${f.size} (${f.type}).`};
}
function fwType(f){
  return {tag:"OC Freeways",cls:"fwy",rec:f,html:`Is OC freeway board <span class="hl">#${f.board}</span> (${fwyName(f.fwy)}, ${f.city}) static or digital?`,
    correct:f.type,options:["Static","Digital","Wallscape","Poster"],fixed:true,
    note:`#${f.board} is a ${f.type.toLowerCase()} board (${f.vendor}).`};
}
function fwWhichBoard(){
  const target=pick(FWY_LIST);
  const onIt=FWY.filter(f=>f.fwy===target), offIt=FWY.filter(f=>f.fwy!==target);
  if(onIt.length<1||offIt.length<3)return null;
  const correct=pick(onIt);
  const d=sample(offIt.map(f=>f.board),3,[]); if(d.length<3)return null;
  return {tag:"OC Freeways",cls:"fwy",rec:correct,html:`Which of these boards is on <span class="hl">${fwyName(target)}</span> in Orange County?`,
    correct:correct.board,options:[correct.board,...d],note:`#${correct.board} is on ${fwyName(target)}. The others run along different OC freeways.`};
}
function fwyPool(){
  const p=[];
  ["22","55","5","91","57","405"].forEach(code=>{
    const boards=FWY_BY[code]||[];
    shuffle(boards).slice(0,4).forEach(f=>{
      [fwFacing(f),fwCity(f),fwVendor(f),fwSize(f),fwType(f),fwOnWhich(f)].forEach(q=>{if(q)p.push(q);});
    });
  });
  for(let i=0;i<8;i++){const q=fwWhichBoard();if(q)p.push(q);}
  return p.filter(Boolean);
}

/* ---------- general pool ---------- */
function generalPool(){
  const p=[];
  shuffle(BOARDS.filter(b=>b.zip)).slice(0,16).forEach(b=>{const q=qZip(b);if(q)p.push(q);});
  shuffle(BOARDS).slice(0,16).forEach(b=>{const q=qVendor(b);if(q)p.push(q);});
  shuffle(BOARDS).slice(0,16).forEach(b=>{const q=qBoardCity(b);if(q)p.push(q);});
  shuffle(BOARDS).slice(0,8).forEach(b=>{const q=qBoardMarket(b);if(q)p.push(q);});
  shuffle(BOARDS).slice(0,8).forEach(b=>{const q=qCompanyCity(b);if(q)p.push(q);});
  for(let i=0;i<5;i++){const q=qCoverageCity(pick(["Dallas Billboards LLC","Bray Outdoor Ads"]));if(q)p.push(q);}
  Object.keys(MARKETS).forEach(c=>p.push(qMarketState(c)));
  return p.filter(Boolean);
}

function finalize(list){
  const seen=new Set(),out=[];
  for(const q of list){
    if(seen.has(q.html))continue; seen.add(q.html);
    q.options=q.fixed?q.options.slice():shuffle(q.options);
    out.push(q);
  }
  return out;
}
function buildRound(){
  const managed=shuffle(finalize(managedPool()));
  const fwy=shuffle(finalize(fwyPool()));
  const general=shuffle(finalize(generalPool()));
  const round=[];
  round.push(...managed.slice(0,4));
  round.push(...fwy.slice(0,6));
  round.push(...general.slice(0, ROUND_SIZE-round.length));
  return shuffle(round).slice(0,ROUND_SIZE);
}

/* ============================================================
   EXPLORE / DETAIL PANEL (offline, from embedded data)
   ============================================================ */
function detailRows(rec){
  const rows=[]; const R=(k,v)=>{ if(v) rows.push(`<div class="drow"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>`); };
  if(rec.kind==="fwy"){
    R("Board #",rec.board); R("Owner / vendor",rec.vendor); R("Freeway",fwyName(rec.fwy));
    R("City",rec.city); R("ZIP",rec.zip); R("Facing",FACE[rec.facing]||rec.facing);
    R("Size",rec.size); R("Type",rec.type); R("Market","Orange County (OC)");
    R("Agency","Bray Outdoor Ads (CA)");
  } else if(rec.kind==="mgd"){
    R("Board #",rec.board); R("Owner / vendor",rec.vendor); R("Road / Hwy",rec.road);
    R("City",rec.city); R("ZIP",rec.zip); R("Facing",FACE[rec.facing]||rec.facing);
    R("Size",rec.size); R("Type",rec.type);
    R("State",rec.state==="TX"?"Texas":"California");
    R("Agency",rec.state==="TX"?"Dallas Billboards LLC":"Bray Outdoor Ads");
    R("Managed by Cory","Yes");
  } else {
    R("Board #",rec.board); R("Owner / vendor",rec.vendor); R("City",rec.city);
    R("ZIP",rec.zip); R("Market",rec.marketLabel); R("Agency",rec.company);
  }
  return rows.join("");
}
function relatedChips(rec){
  const chips=[];
  if(rec.kind==="fwy") chips.push(`<button class="chip" data-act="fwy" data-key="${rec.fwy}">Other boards on the ${rec.fwy}</button>`);
  if(rec.city && CITY_INDEX[rec.city] && CITY_INDEX[rec.city].length>1)
    chips.push(`<button class="chip" data-act="city" data-key="${esc(rec.city)}" data-self="${esc(rec.board)}">Other boards in ${esc(rec.city)}</button>`);
  return chips.length?`<div class="chips">${chips.join("")}</div>`:"";
}
function renderDetail(rec){
  const host=document.getElementById("detail");
  host.classList.add("show");
  host.innerHTML=`<div class="dh">📋 Board details &mdash; #${esc(rec.board)}</div>${detailRows(rec)}${relatedChips(rec)}`;
  host.querySelectorAll(".chip").forEach(c=>{
    c.onclick=()=>{
      const act=c.getAttribute("data-act"), key=c.getAttribute("data-key");
      if(act==="fwy") showFwyList(key, rec);
      else showCityList(key, c.getAttribute("data-self"), rec);
    };
  });
}
function listHTML(title, items, note){
  const rows=items.map(i=>`<div class="litem"><span class="lb">#${esc(i.board)}</span><span class="lm">${esc(i.who)} &middot; ${esc(i.where)}</span></div>`).join("");
  return `<div class="dh">${title}<button class="bk" id="dback">&lsaquo; Back</button></div>${rows||'<div class="lnote">No others found.</div>'}${note?`<div class="lnote">${note}</div>`:""}`;
}
function showFwyList(fwy, rec){
  const host=document.getElementById("detail");
  const items=FWY.filter(f=>f.fwy===fwy && f.board!==rec.board)
    .map(f=>({board:f.board,who:f.vendor,where:f.city})).slice(0,14);
  host.innerHTML=listHTML(`Boards on ${fwyName(fwy)} (${FWY_BY[fwy].length} total)`, items, "Tap Back for the board details.");
  document.getElementById("dback").onclick=()=>renderDetail(rec);
}
function showCityList(city, self, rec){
  const host=document.getElementById("detail");
  const items=(CITY_INDEX[city]||[]).filter(o=>o.board!==self).slice(0,14);
  host.innerHTML=listHTML(`Boards in ${esc(city)} (${(CITY_INDEX[city]||[]).length} total)`, items, "Tap Back for the board details.");
  document.getElementById("dback").onclick=()=>renderDetail(rec);
}

/* ============================================================
   GAME STATE + RENDER
   ============================================================ */
let questions=[], idx=0, score=0, answered=false;
const screen=document.getElementById("screen");

function start(){ questions=buildRound(); idx=0; score=0; answered=false; renderQuestion(); }

function renderStart(){
  screen.innerHTML=`
    <div class="center">
      <div class="tag">${BOARDS.length+MANAGED.length+FWY.length} real records loaded</div>
      <p class="lead">Trivia built straight from your live BrayPro inventory &mdash; now with a tap-to-explore <b>Board details</b> panel after every answer.</p>
      <ul class="facts">
        <li><b>Your 12 managed boards</b> &mdash; roads, cities, ZIPs, facing &amp; digital vs static</li>
        <li><b>Every OC freeway</b> (the 5, 22, 55, 57, 91 &amp; 405) &mdash; all ${FWY.length} freeway boards, facing &amp; size</li>
        <li><b>DFW / OC / LA</b> general inventory &mdash; ${BOARDS.length} boards</li>
        <li>After each answer: full board record + "other boards on the freeway / in the city"</li>
      </ul>
      <button class="btn-primary" id="startBtn">&#9654;&nbsp;&nbsp;Start Game</button>
    </div>`;
  document.getElementById("startBtn").onclick=start;
}

function renderQuestion(){
  answered=false;
  const q=questions[idx];
  const pct=Math.round((idx)/questions.length*100);
  screen.innerHTML=`
    <div class="topbar">
      <span class="pill">Question <b>${idx+1}</b> / ${questions.length}</span>
      <span class="pill">Score <b>${score}</b></span>
    </div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <div class="tag ${q.cls||''}">${q.tag}</div>
    <p class="q">${q.html}</p>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <div class="detail" id="detail"></div>
    <div class="hint" id="hint"><span class="up">&#8593;</span> Tap an answer to lock it in</div>
    <button class="next" id="next">${idx+1<questions.length?"Next Question &rarr;":"See Results &rarr;"}</button>
  `;
  const optsEl=document.getElementById("opts");
  q.options.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="ic">${String.fromCharCode(65+i)}</span><span>${esc(opt)}</span>`;
    b.onclick=()=>choose(opt,b);
    optsEl.appendChild(b);
  });
  document.getElementById("next").onclick=nextQuestion;
}

function choose(opt,btn){
  if(answered) return;
  answered=true;
  const q=questions[idx];
  [...document.querySelectorAll(".opt")].forEach(b=>{
    b.disabled=true;
    const label=b.querySelector("span:last-child").textContent;
    if(label===q.correct){ b.classList.add("correct"); b.querySelector(".ic").textContent="✓"; }
    else if(b===btn){ b.classList.add("wrong"); b.querySelector(".ic").textContent="✗"; }
    else { b.classList.add("dim"); }
  });
  const fb=document.getElementById("fb");
  if(opt===q.correct){ score++; fb.className="feedback good"; fb.innerHTML=`Correct! <small>${q.note}</small>`; }
  else { fb.className="feedback bad"; fb.innerHTML=`Not quite &mdash; answer: <b>${esc(q.correct)}</b><small>${q.note}</small>`; }
  if(q.rec) renderDetail(q.rec);
  const hint=document.getElementById("hint"); if(hint) hint.style.display="none";
  const nx=document.getElementById("next");
  nx.classList.add("show");
  nx.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function nextQuestion(){ idx++; if(idx<questions.length){ renderQuestion(); } else { renderEnd(); } }

function renderEnd(){
  const total=questions.length, pct=Math.round(score/total*100);
  let verdict,color;
  if(pct===100){verdict="🏆 Perfect round — you know every board!";color="var(--green)";}
  else if(pct>=80){verdict="🔥 Sharp — you know your inventory.";color="var(--green)";}
  else if(pct>=60){verdict="👍 Solid. A few boards slipped by.";color="var(--blue)";}
  else if(pct>=40){verdict="📈 Room to grow — run it back.";color="var(--accent)";}
  else{verdict="🗺️ Time to study the map!";color="var(--red)";}
  screen.innerHTML=`
    <div class="center">
      <div class="tag">Round Complete</div>
      <div class="score-num">${score}<span>/${total}</span></div>
      <div class="verdict" style="color:${color}">${verdict}</div>
      <div class="stats">
        <div class="stat"><b>${pct}%</b><small>accuracy</small></div>
        <div class="stat"><b>${score}</b><small>correct</small></div>
        <div class="stat"><b>${total-score}</b><small>missed</small></div>
      </div>
      <button class="btn-primary" id="again">&#128260;&nbsp;&nbsp;Play Again</button>
    </div>`;
  document.getElementById("again").onclick=start;
}

renderStart();
</script>
</body>
</html>
